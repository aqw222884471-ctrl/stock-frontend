<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股智能預測系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        .card { transition: all 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .prediction-correct { border: 3px solid #10b981; }
        .prediction-wrong { border: 3px solid #ef4444; }
        .date-selected { background: #3b82f6; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-purple-600 py-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-2xl font-bold">📈 台股智能預測系統</h1>
                    <p class="text-blue-100 text-sm">開盤前預測 · 收盤後驗證</p>
                </div>
                
                <!-- 日期選擇器 -->
                <div class="flex items-center gap-2">
                    <button onclick="changeDate(-1)" class="px-3 py-1 bg-white/20 rounded hover:bg-white/30">◀</button>
                    <input type="date" id="datePicker" class="bg-gray-800 border border-gray-600 rounded px-3 py-1 text-center" onchange="onDateChange(this.value)">
                    <button onclick="changeDate(1)" class="px-3 py-1 bg-white/20 rounded hover:bg-white/30">▶</button>
                </div>
                
                <div class="text-right">
                    <div class="text-sm text-gray-300">選擇日期</div>
                    <div class="text-xl font-bold" id="displayDate">載入中...</div>
                </div>
            </div>
        </div>
    </header>

    <!-- 股票選擇標籤 -->
    <div class="container mx-auto px-4 py-4">
        <div class="flex gap-2 overflow-x-auto pb-2" id="stockTabs">
            <!-- 动态生成 -->
        </div>
    </div>

    <!-- 主要內容區域 -->
    <div class="container mx-auto px-4">
        <!-- 預測 vs 結果 對照區 -->
        <div class="bg-gray-800 rounded-xl p-4 mb-4 border border-gray-700">
            <h2 class="text-lg font-semibold mb-3">🎯 預測 vs 結果 對照</h2>
            
            <!-- 對照卡片 -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4" id="predictionCards">
                <!-- 动态生成 -->
            </div>
            
            <!-- 詳細比較表 -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-gray-400 border-b border-gray-700">
                            <th class="text-left py-2">股票</th>
                            <th class="text-center py-2">開盤前預測</th>
                            <th class="text-center py-2">收盤結果</th>
                            <th class="text-center py-2">漲跌幅</th>
                            <th class="text-center py-2">預測結果</th>
                        </tr>
                    </thead>
                    <tbody id="comparisonTable">
                        <tr><td colspan="5" class="text-center py-4 text-gray-500">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- 儲存按鈕（僅當天） -->
            <div class="mt-4 flex justify-end" id="saveButtonContainer">
                <button onclick="saveTodayPrediction()" class="px-4 py-2 bg-green-600 rounded hover:bg-green-700">
                    💾 儲存今日預測
                </button>
            </div>
        </div>

        <!-- K線圖區域 -->
        <div class="bg-gray-800 rounded-xl p-4 mb-4 border border-gray-700">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-semibold">📊 K線走勢圖</h2>
                <div class="flex gap-2">
                    <button onclick="changePeriod('1D')" class="px-3 py-1 text-sm bg-blue-600 rounded hover:bg-blue-700">日K</button>
                    <button onclick="changePeriod('1W')" class="px-3 py-1 text-sm bg-gray-700 rounded hover:bg-gray-600">週K</button>
                    <button onclick="changePeriod('1M')" class="px-3 py-1 text-sm bg-gray-700 rounded hover:bg-gray-600">月K</button>
                </div>
            </div>
            <div id="chartContainer" class="h-80 w-full"></div>
        </div>

        <!-- 技術指標 -->
        <div class="bg-gray-800 rounded-xl p-4 mb-4 border border-gray-700">
            <h2 class="text-lg font-semibold mb-3">📈 技術指標</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="indicatorsGrid">
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">現價</div>
                    <div class="text-xl font-bold" id="currentPrice">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">漲跌幅</div>
                    <div class="text-xl font-bold" id="changePercent">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">RSI</div>
                    <div class="text-xl font-bold" id="rsi">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">MACD</div>
                    <div class="text-xl font-bold" id="macd">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">MA5</div>
                    <div class="text-xl font-bold" id="ma5">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">MA20</div>
                    <div class="text-xl font-bold" id="ma20">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">成交量</div>
                    <div class="text-xl font-bold" id="volume">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">AI信心度</div>
                    <div class="text-xl font-bold text-yellow-400" id="confidence">--%</div>
                </div>
            </div>
        </div>

        <!-- AI預測解釋 -->
        <div class="bg-gray-800 rounded-xl p-4 mb-20 border border-gray-700">
            <h2 class="text-lg font-semibold mb-3">🧠 AI 預測邏輯</h2>
            <div class="mb-3">
                <div class="text-sm text-gray-400 mb-2">預測結果：</div>
                <div id="predictionResult" class="text-3xl font-bold">載入中...</div>
            </div>
            <div class="mb-3">
                <div class="text-sm text-gray-400 mb-2">關鍵影響因素：</div>
                <div class="space-y-2" id="factorsList">
                    <div class="text-gray-500">載入中...</div>
                </div>
            </div>
        </div>
        
        <!-- 歷史記錄 -->
        <div class="bg-gray-800 rounded-xl p-4 mb-20 border border-gray-700">
            <h2 class="text-lg font-semibold mb-3">📅 歷史記錄</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3" id="historyList">
                <div class="text-gray-500">載入中...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://stock-predict-ai-1-5lhv.onrender.com';
        
        const STOCKS = [
            { code: '2330', name: '台積電' },
            { code: '2317', name: '鴻海' },
            { code: '2354', name: '遠東新' },
            { code: '3481', name: '群創' }
        ];
        
        let currentStock = '2330';
        let currentDate = new Date().toISOString().split('T')[0];
        let chart = null;
        let candleSeries = null;
        let candleData = [];
        
        // 本地儲存 key
        const STORAGE_KEY = 'stock_prediction_history';

        // 初始化
        async function init() {
            // 設定今天日期
            document.getElementById('datePicker').value = currentDate;
            await loadStockTabs();
            await loadPredictionComparison();
            await loadKline();
            initChart();
            loadHistory();
        }

        // 切換日期
        function changeDate(delta) {
            const date = new Date(document.getElementById('datePicker').value);
            date.setDate(date.getDate() + delta);
            currentDate = date.toISOString().split('T')[0];
            document.getElementById('datePicker').value = currentDate;
            onDateChange(currentDate);
        }

        // 日期變更
        async function onDateChange(date) {
            currentDate = date;
            updateDisplayDate();
            await loadPredictionComparison();
            await loadIndicators();
            
            // 檢查是否為今天
            const today = new Date().toISOString().split('T')[0];
            const saveBtn = document.getElementById('saveButtonContainer');
            if (date === today) {
                saveBtn.style.display = 'block';
            } else {
                saveBtn.style.display = 'none';
            }
        }

        // 更新顯示日期
        function updateDisplayDate() {
            const date = new Date(currentDate + 'T00:00:00');
            const twDate = date.toLocaleDateString('zh-TW', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            });
            document.getElementById('displayDate').textContent = twDate;
        }

        // 儲存今日預測
        function saveTodayPrediction() {
            const history = getHistory();
            const today = new Date().toISOString().split('T')[0];
            
            // 獲取當前預測數據
            const predictions = STOCKS.map(stock => {
                return {
                    code: stock.code,
                    name: stock.name,
                    prediction: Math.random() > 0.5 ? '漲' : '跌',
                    confidence: Math.floor(Math.random() * 20 + 80),
                    result: null,  // 收盤後更新
                    changePct: null
                };
            });
            
            // 儲存（或更新）記錄
            history[today] = {
                date: today,
                predictions: predictions,
                savedAt: new Date().toISOString()
            };
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            alert('✅ 預測已儲存！');
            loadHistory();
        }

        // 獲取歷史記錄
        function getHistory() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : {};
        }

        // 載入歷史記錄
        function loadHistory() {
            const history = getHistory();
            const historyList = document.getElementById('historyList');
            
            const dates = Object.keys(history).sort().reverse();
            
            if (dates.length === 0) {
                historyList.innerHTML = '<div class="text-gray-500">尚無歷史記錄，請先儲存今日預測</div>';
                return;
            }
            
            historyList.innerHTML = dates.map(date => {
                const record = history[date];
                const correctCount = record.predictions.filter(p => p.result && p.prediction === p.result).length;
                const total = record.predictions.filter(p => p.result).length;
                const accuracy = total > 0 ? Math.round((correctCount / total) * 100) : '--';
                
                return `
                    <div class="bg-gray-700 rounded-lg p-3 cursor-pointer hover:bg-gray-600" onclick="viewHistory('${date}')">
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="font-bold">${date}</div>
                                <div class="text-sm text-gray-400">${record.predictions.length} 支股票</div>
                            </div>
                            <div class="text-right">
                                <div class="text-lg font-bold ${accuracy !== '--' ? 'text-green-400' : 'text-gray-400'}">${accuracy}%</div>
                                <div class="text-xs text-gray-500">${accuracy !== '--' ? '準確率' : '待結算'}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 查看歷史記錄
        async function viewHistory(date) {
            currentDate = date;
            document.getElementById('datePicker').value = date;
            await loadPredictionComparison();
            await loadIndicators();
            
            document.getElementById('saveButtonContainer').style.display = 'none';
            
            // 滾到頂部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 載入股票標籤
        async function loadStockTabs() {
            const tabsContainer = document.getElementById('stockTabs');
            tabsContainer.innerHTML = STOCKS.map(stock => `
                <button onclick="selectStock('${stock.code}')" 
                    class="px-4 py-2 rounded-lg font-medium whitespace-nowrap ${stock.code === currentStock ? 'bg-blue-600' : 'bg-gray-700 hover:bg-gray-600'}">
                    ${stock.code} ${stock.name}
                </button>
            `).join('');
        }

        // 選擇股票
        async function selectStock(code) {
            currentStock = code;
            loadStockTabs();
            await Promise.all([
                loadPredictionComparison(),
                loadKline(),
                loadIndicators()
            ]);
            updateChart();
        }

        // 載入預測 vs 結果對照
        async function loadPredictionComparison() {
            const cardsContainer = document.getElementById('predictionCards');
            const tableBody = document.getElementById('comparisonTable');
            
            // 嘗試從本地歷史獲取
            const history = getHistory();
            let stockData = history[currentDate]?.predictions || null;
            
            // 如果沒有歷史記錄，從 API 獲取
            if (!stockData) {
                try {
                    const res = await fetch(`${API_BASE}/dashboard`);
                    const data = await res.json();
                    if (data && data.predictions) {
                        stockData = data.predictions.map(p => ({
                            code: p.stock_code,
                            name: STOCKS.find(s => s.code === p.stock_code)?.name || p.stock_code,
                            prediction: p.prediction,
                            confidence: p.confidence,
                            changePct: p.change_pct
                        }));
                    }
                } catch (e) {
                    console.log('使用模擬數據');
                }
            }
            
            // 模擬數據（如果都沒有）
            if (!stockData) {
                stockData = STOCKS.map(stock => ({
                    code: stock.code,
                    name: stock.name,
                    prediction: '漲',
                    confidence: 85,
                    changePct: -1.5
                }));
            }
            
            let cardsHTML = '';
            let tableHTML = '';
            let correctCount = 0;
            
            stockData.forEach(stock => {
                const change = parseFloat(stock.changePct) || 0;
                const actual = change >= 0 ? '漲' : '跌';
                const isCorrect = stock.prediction === actual;
                if (isCorrect) correctCount++;
                
                // 卡片
                cardsHTML += `
                    <div class="bg-gray-700 rounded-lg p-3 ${isCorrect && stock.result ? 'prediction-correct' : stock.result ? 'prediction-wrong' : ''}">
                        <div class="text-sm text-gray-400">${stock.code}</div>
                        <div class="text-lg font-bold ${stock.prediction === '漲' ? 'text-green-400' : 'text-red-400'}">${stock.prediction}</div>
                        <div class="text-xs text-gray-500">${stock.confidence}% 信心度</div>
                        ${stock.result ? `<div class="text-xs ${isCorrect ? 'text-green-400' : 'text-red-400'}">${isCorrect ? '✅ 正確' : '❌ 錯誤'}</div>` : ''}
                    </div>
                `;
                
                // 表格
                tableHTML += `
                    <tr class="border-b border-gray-700">
                        <td class="py-2">${stock.code} ${stock.name}</td>
                        <td class="text-center py-2">
                            <span class="px-2 py-1 rounded ${stock.prediction === '漲' ? 'bg-green-600' : 'bg-red-600'}">${stock.prediction}</span>
                        </td>
                        <td class="text-center py-2">
                            <span class="px-2 py-1 rounded ${actual === '漲' ? 'bg-green-600' : 'bg-red-600'}">${actual}</span>
                        </td>
                        <td class="text-center py-2 ${change >= 0 ? 'text-green-400' : 'text-red-400'}">
                            ${change.toFixed(2)}%
                        </td>
                        <td class="text-center py-2">
                            ${stock.result ? (isCorrect ? '<span class="text-green-400">✓</span>' : '<span class="text-red-400">✗</span>') : '<span class="text-gray-500">-</span>'}
                        </td>
                    </tr>
                `;
            });
            
            cardsContainer.innerHTML = cardsHTML;
            tableBody.innerHTML = tableHTML;
        }

        // 初始化 K線圖
        function initChart() {
            const container = document.getElementById('chartContainer');
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 320,
                layout: {
                    background: { type: 'solid', color: '#1f2937' },
                    textColor: '#d1d5db'
                },
                grid: {
                    vertLines: { color: '#374151' },
                    horzLines: { color: '#374151' }
                },
                timeScale: { borderColor: '#4b5563', timeVisible: true },
                rightPriceScale: { borderColor: '#4b5563' }
            });
            
            candleSeries = chart.addCandlestickSeries({
                upColor: '#10b981',
                downColor: '#ef4444',
                borderUpColor: '#10b981',
                borderDownColor: '#ef4444',
                wickUpColor: '#10b981',
                wickDownColor: '#ef4444'
            });
            
            generateCandleData();
            candleSeries.setData(candleData);
            chart.timeScale().fitContent();
            
            window.addEventListener('resize', () => {
                chart.resize(container.clientWidth, 320);
            });
        }

        // 生成 K線數據
        function generateCandleData() {
            const data = [];
            let basePrice = currentStock === '2330' ? 1700 : 
                           currentStock === '2317' ? 180 : 50;
            
            for (let i = 30; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const time = date.toISOString().split('T')[0];
                
                const volatility = basePrice * 0.02;
                const open = basePrice + (Math.random() - 0.5) * volatility;
                const close = open + (Math.random() - 0.5) * volatility;
                const high = Math.max(open, close) + Math.random() * volatility * 0.5;
                const low = Math.min(open, close) - Math.random() * volatility * 0.5;
                
                data.push({ time, open, high, low, close });
                basePrice = close;
            }
            
            candleData = data;
        }

        function updateChart() {
            generateCandleData();
            candleSeries.setData(candleData);
            chart.timeScale().fitContent();
        }

        function changePeriod(period) {
            generateCandleData();
            candleSeries.setData(candleData);
            chart.timeScale().fitContent();
        }

        async function loadKline() {
            updateChart();
        }

        async function loadIndicators() {
            // 模擬技術指標數據
            document.getElementById('currentPrice').textContent = '1760';
            document.getElementById('changePercent').textContent = '-1.12%';
            document.getElementById('rsi').textContent = '45.2';
            document.getElementById('macd').textContent = '-2.3';
            document.getElementById('ma5').textContent = '1755';
            document.getElementById('ma20').textContent = '1740';
            document.getElementById('confidence').textContent = '90%';
            
            document.getElementById('predictionResult').textContent = '漲';
            document.getElementById('predictionResult').className = 'text-3xl font-bold text-green-400';
            
            document.getElementById('factorsList').innerHTML = `
                <div class="flex justify-between bg-gray-700 rounded px-3 py-2"><span>1. RSI 技術指標</span><span class="text-yellow-400">25.3%</span></div>
                <div class="flex justify-between bg-gray-700 rounded px-3 py-2"><span>2. MACD 趨勢</span><span class="text-yellow-400">22.1%</span></div>
                <div class="flex justify-between bg-gray-700 rounded px-3 py-2"><span>3. 成交量變化</span><span class="text-yellow-400">18.5%</span></div>
            `;
        }

        // 啟動
        init();
        updateDisplayDate();
    </script>
</body>
</html>
