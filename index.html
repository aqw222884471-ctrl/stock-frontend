<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股智能預測系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        .card { transition: all 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .prediction-correct { border: 3px solid #10b981; }
        .prediction-wrong { border: 3px solid #ef4444; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-purple-600 py-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-2xl font-bold">📈 台股智能預測系統</h1>
                    <p class="text-blue-100 text-sm">開盤前預測 · 收盤後驗證</p>
                </div>
                
                <!-- 日期選擇器 -->
                <div class="flex items-center gap-2">
                    <button onclick="changeDate(-1)" class="px-3 py-1 bg-white/20 rounded hover:bg-white/30">◀</button>
                    <input type="date" id="datePicker" class="bg-gray-800 border border-gray-600 rounded px-3 py-1 text-center" onchange="onDateChange(this.value)">
                    <button onclick="changeDate(1)" class="px-3 py-1 bg-white/20 rounded hover:bg-white/30">▶</button>
                </div>
                
                <div class="text-right">
                    <div class="text-sm text-gray-300">選擇日期</div>
                    <div class="text-xl font-bold" id="displayDate">載入中...</div>
                </div>
            </div>
        </div>
    </header>

    <!-- 股票選擇標籤 -->
    <div class="container mx-auto px-4 py-4">
        <div class="flex gap-2 overflow-x-auto pb-2" id="stockTabs">
            <!-- 动态生成 -->
        </div>
    </div>

    <!-- 主要內容區域 -->
    <div class="container mx-auto px-4">
        <!-- 即時報價與預測對照區 -->
        <div class="bg-gray-800 rounded-xl p-4 mb-4 border border-gray-700">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-semibold">🎯 今日報價與預測</h2>
                <button onclick="refreshPrices()" class="px-3 py-1 bg-blue-600 rounded hover:bg-blue-700 text-sm">🔄 重新整理</button>
            </div>
            
            <!-- 即時報價卡片 -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4" id="priceCards">
                <div class="text-gray-500">載入中...</div>
            </div>
            
            <!-- 詳細比較表 -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-gray-400 border-b border-gray-700">
                            <th class="text-left py-2">股票</th>
                            <th class="text-center py-2">現價</th>
                            <th class="text-center py-2">漲跌幅</th>
                            <th class="text-center py-2">AI預測</th>
                            <th class="text-center py-2">信心度</th>
                        </tr>
                    </thead>
                    <tbody id="comparisonTable">
                        <tr><td colspan="5" class="text-center py-4 text-gray-500">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- K線圖區域 -->
        <div class="bg-gray-800 rounded-xl p-4 mb-4 border border-gray-700">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-semibold">📊 K線走勢圖 - <span id="chartStockName"></span></h2>
                <div class="flex gap-2">
                    <button onclick="changePeriod('1D')" class="px-3 py-1 text-sm bg-blue-600 rounded hover:bg-blue-700">日K</button>
                    <button onclick="changePeriod('1W')" class="px-3 py-1 text-sm bg-gray-700 rounded hover:bg-gray-600">週K</button>
                    <button onclick="changePeriod('1M')" class="px-3 py-1 text-sm bg-gray-700 rounded hover:bg-gray-600">月K</button>
                </div>
            </div>
            <div id="chartContainer" class="h-96 w-full"></div>
        </div>

        <!-- 技術指標 -->
        <div class="bg-gray-800 rounded-xl p-4 mb-4 border border-gray-700">
            <h2 class="text-lg font-semibold mb-3">📈 技術指標</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="indicatorsGrid">
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">現價</div>
                    <div class="text-xl font-bold" id="currentPrice">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">漲跌幅</div>
                    <div class="text-xl font-bold" id="changePercent">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">RSI</div>
                    <div class="text-xl font-bold" id="rsi">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">MACD</div>
                    <div class="text-xl font-bold" id="macd">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">MA5</div>
                    <div class="text-xl font-bold" id="ma5">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">MA20</div>
                    <div class="text-xl font-bold" id="ma20">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">成交量</div>
                    <div class="text-xl font-bold" id="volume">--</div>
                </div>
                <div class="bg-gray-700 rounded-lg p-3 text-center">
                    <div class="text-gray-400 text-xs">AI信心度</div>
                    <div class="text-xl font-bold text-yellow-400" id="confidence">--%</div>
                </div>
            </div>
        </div>

        <!-- AI預測解釋 -->
        <div class="bg-gray-800 rounded-xl p-4 mb-20 border border-gray-700">
            <h2 class="text-lg font-semibold mb-3">🧠 AI 預測邏輯</h2>
            <div class="mb-3">
                <div class="text-sm text-gray-400 mb-2">預測結果：</div>
                <div id="predictionResult" class="text-3xl font-bold">載入中...</div>
            </div>
            <div class="mb-3">
                <div class="text-sm text-gray-400 mb-2">關鍵影響因素：</div>
                <div class="space-y-2" id="factorsList">
                    <div class="text-gray-500">載入中...</div>
                </div>
            </div>
        </div>
        
        <!-- 歷史記錄 -->
        <div class="bg-gray-800 rounded-xl p-4 mb-20 border border-gray-700">
            <h2 class="text-lg font-semibold mb-3">📅 歷史記錄</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3" id="historyList">
                <div class="text-gray-500">載入中...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://stock-predict-ai-1-5lhv.onrender.com';
        
        const STOCKS = [
            { code: '2330', name: '台積電' },
            { code: '2317', name: '鴻海' },
            { code: '2354', name: '遠東新' },
            { code: '3481', name: '群創' }
        ];
        
        let currentStock = '2330';
        let currentDate = new Date().toISOString().split('T')[0];
        let chart = null;
        let candleSeries = null;
        let candleData = [];
        let stockRealtimeData = {};
        
        const STORAGE_KEY = 'stock_prediction_history';

        // 初始化
        async function init() {
            document.getElementById('datePicker').value = currentDate;
            await loadAllStockData();
            await loadStockTabs();
            await loadPredictionComparison();
            initChart();
            loadHistory();
            updateDisplayDate();
        }

        // 重新整理價格
        async function refreshPrices() {
            const btn = event.target;
            btn.textContent = '載入中...';
            await loadAllStockData();
            await loadPredictionComparison();
            await loadIndicators();
            btn.textContent = '🔄 重新整理';
        }

        // 從 API 載入所有股票即時數據
        async function loadAllStockData() {
            try {
                const res = await fetch(`${API_BASE}/dashboard`);
                const data = await res.json();
                
                if (data && data.predictions) {
                    data.predictions.forEach(p => {
                        stockRealtimeData[p.stock_code] = p;
                    });
                    console.log('更新價格:', stockRealtimeData);
                }
            } catch (e) {
                console.log('無法獲取即時數據');
            }
        }

        function changeDate(delta) {
            const date = new Date(document.getElementById('datePicker').value);
            date.setDate(date.getDate() + delta);
            currentDate = date.toISOString().split('T')[0];
            document.getElementById('datePicker').value = currentDate;
            onDateChange(currentDate);
        }

        async function onDateChange(date) {
            currentDate = date;
            updateDisplayDate();
            await loadPredictionComparison();
            await loadIndicators();
        }

        function updateDisplayDate() {
            const date = new Date(currentDate + 'T00:00:00');
            const twDate = date.toLocaleDateString('zh-TW', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            });
            document.getElementById('displayDate').textContent = twDate;
        }

        function getHistory() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : {};
        }

        function loadHistory() {
            const history = getHistory();
            const historyList = document.getElementById('historyList');
            const dates = Object.keys(history).sort().reverse();
            
            if (dates.length === 0) {
                historyList.innerHTML = '<div class="text-gray-500">尚無歷史記錄</div>';
                return;
            }
            
            historyList.innerHTML = dates.map(date => `
                <div class="bg-gray-700 rounded-lg p-3 cursor-pointer hover:bg-gray-600" onclick="viewHistory('${date}')">
                    <div class="font-bold">${date}</div>
                </div>
            `).join('');
        }

        async function viewHistory(date) {
            currentDate = date;
            document.getElementById('datePicker').value = date;
            await loadPredictionComparison();
            await loadIndicators();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function loadStockTabs() {
            const tabsContainer = document.getElementById('stockTabs');
            tabsContainer.innerHTML = STOCKS.map(stock => `
                <button onclick="selectStock('${stock.code}')" 
                    class="px-4 py-2 rounded-lg font-medium whitespace-nowrap ${stock.code === currentStock ? 'bg-blue-600' : 'bg-gray-700 hover:bg-gray-600'}">
                    ${stock.code} ${stock.name}
                </button>
            `).join('');
            
            document.getElementById('chartStockName').textContent = STOCKS.find(s => s.code === currentStock)?.name || currentStock;
        }

        async function selectStock(code) {
            currentStock = code;
            loadStockTabs();
            await Promise.all([
                loadIndicators()
            ]);
            await loadKlineHistory();
            updateChart();
        }

        // 載入報價與預測
        async function loadPredictionComparison() {
            const priceCards = document.getElementById('priceCards');
            const tableBody = document.getElementById('comparisonTable');
            
            let priceHTML = '';
            let tableHTML = '';
            
            STOCKS.forEach(stock => {
                const data = stockRealtimeData[stock.code];
                const price = data?.current_price || '--';
                const changePct = data?.change_pct ? parseFloat(data.change_pct).toFixed(2) : '--';
                const prediction = data?.prediction || '漲';
                const confidence = data?.confidence || '--';
                const changeClass = parseFloat(changePct) >= 0 ? 'text-green-400' : 'text-red-400';
                
                priceHTML += `
                    <div class="bg-gray-700 rounded-lg p-3">
                        <div class="text-sm text-gray-400">${stock.code} ${stock.name}</div>
                        <div class="text-2xl font-bold">${price}</div>
                        <div class="text-sm ${changeClass}">${changePct}%</div>
                    </div>
                `;
                
                tableHTML += `
                    <tr class="border-b border-gray-700">
                        <td class="py-2">${stock.code} ${stock.name}</td>
                        <td class="text-center py-2 font-bold">${price}</td>
                        <td class="text-center py-2 ${changeClass}">${changePct}%</td>
                        <td class="text-center py-2">
                            <span class="px-2 py-1 rounded ${prediction === '漲' ? 'bg-green-600' : 'bg-red-600'}">${prediction}</span>
                        </td>
                        <td class="text-center py-2">${confidence}%</td>
                    </tr>
                `;
            });
            
            priceCards.innerHTML = priceHTML;
            tableBody.innerHTML = tableHTML;
        }

        // 初始化 K線圖
        function initChart() {
            const container = document.getElementById('chartContainer');
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 384,
                layout: {
                    background: { type: 'solid', color: '#1f2937' },
                    textColor: '#d1d5db'
                },
                grid: {
                    vertLines: { color: '#374151' },
                    horzLines: { color: '#374151' }
                },
                timeScale: { borderColor: '#4b5563', timeVisible: true },
                rightPriceScale: { borderColor: '#4b5563' }
            });
            
            candleSeries = chart.addCandlestickSeries({
                upColor: '#10b981',
                downColor: '#ef4444',
                borderUpColor: '#10b981',
                borderDownColor: '#ef4444',
                wickUpColor: '#10b981',
                wickDownColor: '#ef4444'
            });
            
            loadKlineHistory();
            chart.timeScale().fitContent();
            
            window.addEventListener('resize', () => {
                chart.resize(container.clientWidth, 384);
            });
        }

        // 從 API 載入 K線歷史數據
        async function loadKlineHistory() {
            try {
                const res = await fetch(`${API_BASE}/stocks/${currentStock}/history?days=60`);
                const data = await res.json();
                
                if (data && data.data && data.data.length > 0) {
                    candleData = data.data.map(d => ({
                        time: d.date,
                        open: d.open,
                        high: d.high,
                        low: d.low,
                        close: d.close
                    }));
                    
                    if (candleSeries) {
                        candleSeries.setData(candleData);
                        chart.timeScale().fitContent();
                    }
                    console.log('載入K線數據:', candleData.length, '筆');
                }
            } catch (e) {
                console.log('無法獲取K線數據，使用模擬');
                generateCandleData();
            }
        }

        function generateCandleData() {
            const data = [];
            const stockInfo = stockRealtimeData[currentStock];
            let basePrice = stockInfo?.current_price || 
                           (currentStock === '2330' ? 1700 : 
                            currentStock === '2317' ? 180 : 50);
            
            for (let i = 60; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const time = date.toISOString().split('T')[0];
                
                const volatility = basePrice * 0.025;
                const open = basePrice + (Math.random() - 0.5) * volatility;
                const close = open + (Math.random() - 0.5) * volatility;
                const high = Math.max(open, close) + Math.random() * volatility * 0.5;
                const low = Math.min(open, close) - Math.random() * volatility * 0.5;
                
                data.push({ time, open, high, low, close });
                basePrice = close;
            }
            
            candleData = data;
        }

        function updateChart() {
            if (candleSeries) {
                candleSeries.setData(candleData);
                chart.timeScale().fitContent();
            }
        }

        function changePeriod(period) {
            loadKlineHistory();
        }

        // 載入技術指標
        async function loadIndicators() {
            try {
                const res = await fetch(`${API_BASE}/stocks/${currentStock}/prediction`);
                const data = await res.json();
                
                document.getElementById('currentPrice').textContent = data.current_price || '--';
                document.getElementById('changePercent').textContent = (data.change_pct || '--') + '%';
                document.getElementById('rsi').textContent = data.indicators?.rsi?.toFixed(2) || '--';
                document.getElementById('macd').textContent = data.indicators?.macd?.toFixed(2) || '--';
                document.getElementById('ma5').textContent = data.indicators?.ma5?.toFixed(0) || '--';
                document.getElementById('ma20').textContent = data.indicators?.ma20?.toFixed(0) || '--';
                document.getElementById('volume').textContent = data.indicators?.volume_change ? (data.indicators.volume_change * 100).toFixed(0) + '%' : '--';
                document.getElementById('confidence').textContent = (data.confidence || '--') + '%';
                
                const predResult = document.getElementById('predictionResult');
                predResult.textContent = data.prediction || '載入中...';
                predResult.className = `text-3xl font-bold ${data.prediction === '漲' ? 'text-green-400' : 'text-red-400'}`;
                
                if (data.top_factors) {
                    document.getElementById('factorsList').innerHTML = data.top_factors.map((f, i) => `
                        <div class="flex justify-between bg-gray-700 rounded px-3 py-2">
                            <span>${i+1}. ${f.feature}</span>
                            <span class="text-yellow-400">${(f.importance * 100).toFixed(1)}%</span>
                        </div>
                    `).join('');
                }
                
            } catch (e) {
                console.log('使用備用數據');
            }
        }

        init();
    </script>
</body>
</html>
